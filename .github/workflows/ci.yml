name: Continuous Integration

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Since your backend logic lives inside a subfolder, 
    # we must tell the action to execute commands there!
    defaults:
      run:
        working-directory: ./departmental-store

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run test
        run: npm test
